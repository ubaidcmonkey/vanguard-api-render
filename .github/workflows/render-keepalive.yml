name: Render Keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health check
        run: |
          curl --fail --silent --show-error --max-time 20 \
            "https://echoapi-v010.onrender.com/health.php?keepalive=$(date +%s)"
